<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일요일 요정</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/style.css">
    <script src="/app.js" defer></script>
</head>
<body>
    <button class="top-left-icon" type="button" aria-label="숨겨진 이벤트 열기">
        <img src="/favicon.png" alt="">
    </button>
    <section class="secret-chat" aria-live="polite" hidden>
        <div class="secret-chat-header">
            <span>메시지</span>
        </div>
        <div class="secret-chat-body">
            <p class="secret-chat-message"></p>
        </div>
    </section>

    <main class="event-card" th:if="${notice != null}">
        <header class="event-header">
            <h2 class="event-title">
                <a th:href="${notice.url}" target="_blank" rel="noopener noreferrer" th:text="${notice.title}"></a>
            </h2>
            <div class="event-date">
                기간:
                <span th:text="${startAt}"></span>
                ~
                <span th:text="${endAt}"></span>
            </div>
        </header>

        <div class="showcase-banner" th:if="${showShowcase}">
            <p class="showcase-title">[2026 SUMMER SHOWCASE 'OVERDRIVE']</p>
            <p class="showcase-date">일시: 2026년 6월 13일 (토) 오후 4시</p>
        </div>

        <section class="event-content" th:utext="${contents}"></section>
    </main>

    <main class="empty-state" th:unless="${notice != null}">
        <h1>진행 중인 썬데이 메이플 이벤트가 없습니다.</h1>
        <p class="announcement-schedule">매주 금요일 오전 10시에 발표 됩니다</p>
        <div class="showcase-banner" th:if="${showShowcase}">
            <p class="showcase-title">[2026 SUMMER SHOWCASE 'OVERDRIVE']</p>
            <p class="showcase-date">일시: 2026년 6월 13일 (토) 오후 4시</p>
        </div>
    </main>
</body>
</html>
